services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hospital_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hospital_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      - DB_TYPE=postgres
      - DATABASE_URL=host=db user=admin password=password dbname=hospital_db port=5432 sslmode=disable
    depends_on:
      db:
        condition: service_healthy