server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy: ถ้า URL ขึ้นต้นด้วย /api ให้ส่งไปที่ Backend บน Cloud Run
    location /api/ {
        # ตัดคำว่า /api ออกก่อนส่งไปที่ Backend
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass https://hostpitalsystem-719145195998.asia-southeast3.run.app/;
        
        # ตั้งค่า Header ให้ Backend รู้ว่าใครเรียกมา
        proxy_set_header Host hostpitalsystem-719145195998.asia-southeast3.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}