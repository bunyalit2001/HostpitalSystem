steps:
  # --- ส่วนของ Backend ---
  - name: 'golang:1.22'
    dir: 'backend'
    entrypoint: 'go'
    args: ['test', '-v', './...']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/my-backend', './backend']

  # --- ส่วนของ Frontend ---
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--no-cache',
      '--build-arg', 'REACT_APP_API_URL=https://hostpitalsystem-719145195998.asia-southeast3.run.app', 
      '-t', 'gcr.io/$PROJECT_ID/my-frontend',
      './frontend'
    ]

# ขั้นตอนการ Push ทั้งคู่
images:
  - 'gcr.io/$PROJECT_ID/my-backend'
  - 'gcr.io/$PROJECT_ID/my-frontend'